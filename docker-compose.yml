services:
  postgres:
    image: postgres:16-alpine
    container_name: reachly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: reachly
      POSTGRES_PASSWORD: reachly
      POSTGRES_DB: reachly
    ports:
      - "5433:5432"
    volumes:
      - reachly_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: reachly-redis
    restart: unless-stopped
    ports:
      - "6380:6379"

volumes:
  reachly_pg: